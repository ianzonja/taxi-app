services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/var/www/quickride/dist:ro
      - ./certs:/etc/ssl:ro
    depends_on:
      - api

  api:
    build: ./api
    env_file: ./api/.env
    restart: unless-stopped

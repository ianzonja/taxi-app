server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name quickride.com;

    ssl_certificate     /etc/ssl/certs/quickride.crt;
    ssl_certificate_key /etc/ssl/private/quickride.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/quickride/dist;

    # API — proxy to Express service
    location /api/ {
        proxy_pass         http://api:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SSG pre-rendered routes — serve named HTML files
    location = /         { try_files /index.html   =404; }
    location = /booking  { try_files /booking.html =404; }
    location = /blog     { try_files /blog.html    =404; }
    location = /about    { try_files /about.html   =404; }

    # Hashed assets — aggressive caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static loader data for SSG hydration
    location /static-loader-data/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Fallback for any other static file
    location / {
        try_files $uri =404;
    }
}
